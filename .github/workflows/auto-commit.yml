name: Auto Commit Activity

on:
  schedule:
    - cron: '0 23 * * *'   # Runs daily at 11:00 PM UTC (4 AM Pakistan)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update activity file
        run: |
          echo "Last activity: $(date)" >> activity.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add activity.txt
          git commit -m "Daily auto commit" || echo "No changes to commit"
          git push
          
